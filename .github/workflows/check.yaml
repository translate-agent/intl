name: Check

on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      matrix:
        go-version: ['1.24', '1.25', '1.26']
      fail-fast: false
    env:
      FORCE_COLOR: 1
    steps:
      - uses: EarthBuild/actions-setup@f4d20223e70dbb43b5fc08c4d857ab9cf0dbf3ae # v2.2.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Go ${{ matrix.go-version }}
        run: echo "golang_version=${{ matrix.go-version }}" > .arg
      - name: Generate cldr.go
        if: ${{ matrix.go-version == '1.26' }}
        run: |
          earth --strict +generate
          if ! git diff --quiet internal/cldr/data.go; then
            echo "Generated cldr.go file is not up to date"
            git diff
            exit 1
          fi
      - name: Lint
        if: ${{ matrix.go-version == '1.26' }}
        run: earth --ci +lint
      - name: Test Unit
        if: ${{ matrix.go-version == '1.26' }}
        run: earth --ci +test
