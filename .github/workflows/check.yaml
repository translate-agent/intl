name: Check

on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    strategy:
      matrix:
        go-version: ['1.24', '1.25', '1.26']
      fail-fast: false
    env:
      FORCE_COLOR: 1
    steps:
      - uses: EarthBuild/actions-setup@v2.1.0
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Go ${{ matrix.go-version }}
        run: echo "golang_version=${{ matrix.go-version }}" > .arg
      - name: Generate cldr.go
        if: ${{ matrix.go-version == '1.26' }}
        run: |
          earthly --strict +generate
          if ! git diff --quiet internal/cldr/data.go; then
            echo "Generated cldr.go file is not up to date"
            git diff
            exit 1
          fi
      - name: Lint
        if: ${{ matrix.go-version == '1.26' }}
        run: earthly --ci +lint
      - name: Test Unit
        if: ${{ matrix.go-version == '1.26' }}
        run: earthly --ci +test
